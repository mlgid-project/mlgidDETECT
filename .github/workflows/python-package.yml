# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # Install Conda in a CI-friendly way. Avoid `conda init` in GitHub Actions.
    - name: Set up Conda (Miniforge)
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        auto-update-conda: true
        use-mamba: true

    - name: check CPU
      shell: bash -l {0}
      run: |
        cd setup
        mamba env create -f conda_cpu.yaml
        conda run -n mlgiddetect-cpu python -V

    - name: check GPU
      shell: bash -l {0}
      run: |
        cd setup
        printf "y\n" | python setup_cuda.py
        conda run -n mlgiddetect-gpu python -V
