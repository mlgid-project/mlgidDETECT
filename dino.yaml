GENERAL:
  DEBUG: True                   #more verbose logging

MODEL:
  TYPE: 'dino'                  #currently supported 'dino' and 'faster_rcnn'
  REDOWNLOAD: False             #redownload the model for each run
  FORCE_CPU: False              #force inference on CPU

PREPROCESSING:
  CUDA: False                   #use CUDA for preprocessing if available
  FLIPHORIZONTAL: False         #flip the image horizontally for preprocessing
  QUAZIPOLAR: False             #use quazipolar transformation for preprocessing 
  LINEAR_CONTRAST: False         #use linear contrast correction for preprocessing
  NO_CONTRASTCORRECTION: False  #do not perform any contrast correction for preprocessing
  POLAR_SHAPE: [512,1024]       #model input size
  POLAR_CONVERSION: True        #use to perform polar conversion 

POSTPROCESSING:
  SCORE: 0.4                    #minimum score for peaks
  NMSIOU: 0.4                   #non maximum suppression iou threshold
  TTA: False                    #use test time augmentation for postprocessing

INPUT:
  DATASET: '/home/nicolerch/Documents/mlgid/mlgidDETECT_personal/inputs/organic_labeled.h5'  #pygid NeXus h5 file
  #IMGPATH: './inputs/w4_mapbbr32.tif'  #image file in reciprocal coordinates
  LABELED: True                #option to use labeled data for evaluation
  PYGIDLABELED: True           #option to use PyGID labeled dataset

OUTPUT:
  IMAGEPREFIX: 'test'    #image prefix for saving 
  FOLDER: '/home/nicolerch/Documents/mlgid/mlgidDETECT/outputs'           #image output folder 